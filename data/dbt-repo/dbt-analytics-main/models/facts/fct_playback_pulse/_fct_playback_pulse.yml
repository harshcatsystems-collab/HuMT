version: 2

models:
  - name: fct_playback_pulse
    description: |
      A playback pulse is a heartbeat sent out by our video player when a user is watching content on
      stage. This event can be used to zoom in and study consumption of our content in detail.
    config:
      materialized: view
      tags: ["lightdash", "lightdash-explore"]
    meta:
      label: Playback Pulse
      joins:
        - join: dim_content
          type: inner
          sql_on: ${fct_playback_pulse.content_id} = ${dim_content.content_id}
        - join: dim_devices
          type: left
          sql_on: |
            ${fct_playback_pulse.device_id} = ${dim_devices.device_id}
            and ${fct_playback_pulse.event_at} >= ${dim_devices.valid_from}
            and ${fct_playback_pulse.event_at} <= coalesce(${dim_devices.valid_to}, current_timestamp)
    columns:
      - name: user_id
        description: Foreign key, ID of the user account watching
        meta:
          dimension:
            hidden: false
      - name: anonymous_id
        description: Foreign key, anonymous ID assigned by rudderstack
        meta:
          dimension:
            hidden: false
      - name: session_id
        description: Foreign key, ID of the session as generated by rudderstack
        meta:
          dimension:
            hidden: false
      - name: device_id
        description: Foreign key, ID of the device being used to watch
        meta:
          dimension:
            hidden: false
          metrics:
            total_pulse_count:
              label: Total Watch Count
              type: count
            distinct_watchers:
              label: Distinct Watch Count
              type: count_distinct
      - name: content_id
        description: Foreign key, ID of the content being watched
        meta:
          dimension:
            hidden: true
      - name: connection_mode
        description: What kind of internet connection is being used to watch
        meta:
          dimension:
            type: string
      - name: player_mode
        description: Whether the player is in full screen or pip
        meta:
          dimension:
            type: string
      - name: playback_quality
        description: What quality is the content being consumed in
        meta:
          dimension:
            type: string
      - name: subtitle_language
        description: Whether the user has enabled subtitles while watching content
        meta:
          dimension:
            type: string
      - name: pulse_interval_seconds
        description: Time gap in seconds between two pulses
        meta:
          dimension:
            type: string
      - name: video_position_seconds
        description: The location in the video where this pulse was sent from, in seconds
        meta:
          dimension:
            type: number
      - name: video_position_min
        description: The location in the video where this pulse was sent from, in minutes
        meta:
          dimension:
            type: number
      - name: event_at
        description: The timestamp when this pulse was sent
        meta:
          dimension:
            type: timestamp
      - name: event_date
        description: The date when this pulse was sent
        meta:
          dimension:
            hidden: true