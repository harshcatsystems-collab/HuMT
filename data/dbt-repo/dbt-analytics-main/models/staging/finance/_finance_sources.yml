version: 2

sources:
  - name: finance_uploads_phonepe
    database: finance_audit_uploads
    schema: phonepe
    tables:
      - name: transactions
        description: "PhonePe transaction data containing merchant transactions."
      - name: refunds
        description: "PhonePe refunds table containing refund details mapped to transactions."
      - name: settlements
        description: "PhonePe settlements information used to track payment reconciliation."

  - name: paytm
    database: finance_audit_uploads
