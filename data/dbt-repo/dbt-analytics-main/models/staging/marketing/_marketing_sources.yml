version: 2

sources:
  - name: facebook_marketing # replace with the actual schema name where airbyte lands the data
    description: "raw data from facebook marketing api, loaded by airbyte."
    database: raw_prod
    schema: facebook_marketing
    tables:
      - name: ads_insights
        description: "raw ads insights data containing performance metrics and breakdowns for facebook ads. each row can represent an ad's performance for a specific day and set of breakdowns."

        columns:
          - name: account_id
            description: "the id of the ad account."
          - name: account_name
            description: "the name of the ad account."
          - name: account_currency
            description: "the currency used by the ad account. 
            Its 3 capital letter code. For Facebook, it is INR."
          - name: campaign_id
            description: "the id of the ad campaign."
          - name: campaign_name
            description: "the name of the ad campaign."
          - name: adset_id
            description: "the id of the ad set."
          - name: adset_name
            description: "the name of the ad set."
          - name: ad_id
            description: "the id of the ad. this can be null if the insight is at a higher level (e.g., campaign or adset)."

          - name: ad_name
            description: "the name of the ad."
          - name: date_start
            description: "the start date of the period for which the insight data is aggregated (yyyy-mm-dd)."
          - name: date_stop
            description: "the end date of the period for which the insight data is aggregated (yyyy-mm-dd)."
          - name: spend
            description: "the estimated total amount of money spent on your ad, ad set, or campaign during its schedule. (numeric string from api)"
          - name: impressions
            description: "the number of times ads were on screen. (numeric string from api)"
          - name: clicks
            description: "the number of clicks on ads. (numeric string from api)"
          - name: reach
            description: "the number of unique people who saw your ads at least once. (numeric string from api)"
  
  - name: google_ads
    description: "raw data from google ads api, loaded by airbyte."
    database: raw_prod
    schema: google_ads
    tables:
      - name: campaign
        description: "raw campaign data from google ads, aggregated daily."
        columns:
          - name: campaign__id
            description: "the id of the campaign."
          - name: segments__date
            description: "the date to which the metrics apply (yyyy-mm-dd)."
          - name: campaign__name
            description: "the name of the campaign."
          - name: metrics__clicks
            description: "the number of clicks on the campaign."
          - name: metrics__cost_micros
            description: "the total cost of the campaign in micros."
          - name: metrics__impressions
            description: "the number of times the campaign ads were shown."
          - name: metrics__video_views
            description: "the number of video views for video campaigns."
          - name: metrics__conversions
            description: "the number of conversions attributed to the campaign."
          - name: metrics__conversions_value
            description: "the total value of conversions attributed to the campaign."
          - name: metrics__cost_per_conversion
            description: "the cost per conversion for the campaign."
          - name: metrics__value_per_conversion
            description: "the value per conversion for the campaign."
          - name: metrics__ctr
            description: "the click-through rate for the campaign."
          - name: metrics__average_cpc
            description: "the average cost per click for the campaign."
          - name: metrics__average_cpm
            description: "the average cost per thousand impressions for the campaign."
          - name: metrics__average_cost
            description: "the average cost of an interaction for the campaign."
          - name: metrics__interactions
            description: "the number of interactions with the campaign ads."
          - name: campaign__status
            description: "the current status of the campaign (e.g., ENABLED, PAUSED)."
          - name: campaign__start_date
            description: "the start date of the campaign."
          - name: campaign__end_date
            description: "the end date of the campaign."
          - name: advertising_channel_type
            description: "the primary advertising channel type (e.g., SEARCH, DISPLAY)."
          - name: advertising_channel_sub_type
            description: "the advertising channel sub type (e.g., SMART_CAMPAIGN, VIDEO_ACTION)."
          - name: segments__ad_network_type
            description: "the type of ad network (e.g., GOOGLE_SEARCH, SEARCH_PARTNERS)."
          - name: bidding_strategy_type
            description: "the type of bidding strategy used (e.g., MANUAL_CPC, TARGET_CPA)."
          - name: optimization_score
            description: "the optimization score for the campaign."
          - name: campaign_budget__amount_micros
            description: "the campaign budget amount in micros."
      - name: ad_group
        description: "raw ad group data from google ads, aggregated daily."
        columns:
          - name: ad_group__id
            description: "the id of the ad group."
          - name: campaign__id
            description: "the id of the campaign the ad group belongs to."
          - name: ad_group__name
            description: "the name of the ad group."
          - name: ad_group__type
            description: "the type of the ad group (e.g., SEARCH_STANDARD, DISPLAY_STANDARD)."
          - name: segments__date
            description: "the date to which the metrics apply (yyyy-mm-dd)."
          - name: ad_group__status
            description: "the current status of the ad group (e.g., ENABLED, PAUSED)."
          - name: metrics__cost_micros
            description: "the total cost of the ad group in micros."
          - name: ad_group__cpc_bid_micros
            description: "the default CPC bid amount for the ad group in micros."
          - name: ad_group__cpm_bid_micros
            description: "the default CPM bid amount for the ad group in micros."
          - name: ad_group__cpv_bid_micros
            description: "the default CPV bid amount for the ad group in micros."
          - name: ad_group__target_cpa_micros
            description: "the target CPA amount for the ad group in micros."
          - name: ad_group__target_cpm_micros
            description: "the target CPM amount for the ad group in micros."
          - name: ad_group__target_roas
            description: "the target ROAS for the ad group."
          - name: ad_group__effective_target_cpa_micros
            description: "the effective target CPA amount for the ad group in micros."
          - name: ad_group__effective_target_roas
            description: "the effective target ROAS for the ad group."
          - name: ad_group__effective_target_cpa_source
            description: "the source of the effective target CPA (e.g., AD_GROUP, CAMPAIGN)."
          - name: ad_group__effective_target_roas_source
            description: "the source of the effective target ROAS (e.g., AD_GROUP, CAMPAIGN)."
          - name: ad_group__ad_rotation_mode
            description: "the ad rotation mode for the ad group (e.g., OPTIMIZE, ROTATE_FOREVER)."
          - name: ad_group__optimized_targeting_enabled
            description: "indicates if optimized targeting is enabled for the ad group."
