<!DOCTYPE html>
<html>
<head>
  <title>HuMT Avatar - Background Colors</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; padding: 40px; }
    h1 { text-align: center; margin-bottom: 40px; }
    .grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
    .option { text-align: center; }
    .preview { width: 150px; height: 150px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .preview img { width: 120px; height: 120px; border-radius: 8px; }
    .label { font-size: 14px; opacity: 0.9; }
    .hex { font-family: monospace; font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>
  <h1>🥚 HuMT Avatar - Pick a Background</h1>
  <div class="grid">
    <div class="option">
      <div class="preview" style="background: #E8B896;"><img src="humt-official.png"></div>
      <div class="label">Warm Peach</div>
      <div class="hex">#E8B896</div>
    </div>
    <div class="option">
      <div class="preview" style="background: #D4A574;"><img src="humt-official.png"></div>
      <div class="label">Soft Gold</div>
      <div class="hex">#D4A574</div>
    </div>
    <div class="option">
      <div class="preview" style="background: #C9956C;"><img src="humt-official.png"></div>
      <div class="label">Muted Terracotta</div>
      <div class="hex">#C9956C</div>
    </div>
    <div class="option">
      <div class="preview" style="background: #F5E6D3;"><img src="humt-official.png"></div>
      <div class="label">Cream</div>
      <div class="hex">#F5E6D3</div>
    </div>
    <div class="option">
      <div class="preview" style="background: #8B6914;"><img src="humt-official.png"></div>
      <div class="label">Deep Warm</div>
      <div class="hex">#8B6914</div>
    </div>
  </div>
</body>
</html>
